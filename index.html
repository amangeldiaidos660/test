<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .neon-button {
            background-color: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 18px;
            transition: all 0.3s ease-in-out;
            position: absolute;
        }
        .neon-button:hover {
            background-color: #007bff;
            color: #fff;
            box-shadow: 0 0 10px 3px #007bff, 0 0 20px 6px #007bff, 0 0 35px 9px #007bff;
        }
        .btn-styles{
            margin: 50px;
        }
    </style>
</head>
<body>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene,
        camera,
        renderer,
        cloudParticles = [],
        rainParticles = [],
        flash,
        rain,
        rainGeo,
        rainCount = 15000;
    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            1,
            1000
        );
        camera.position.z = 1;
        camera.rotation.x = 1.16;
        camera.rotation.y = -0.12;
        camera.rotation.z = 0.27;

        ambient = new THREE.AmbientLight(0x555555);
        scene.add(ambient);

        directionalLight = new THREE.DirectionalLight(0xffeedd);
        directionalLight.position.set(0, 0, 1);
        scene.add(directionalLight);

        flash = new THREE.PointLight(0x062d89, 30, 500, 1.7);
        flash.position.set(200, 300, 100);
        scene.add(flash);

        renderer = new THREE.WebGLRenderer();

        scene.fog = new THREE.FogExp2(0x11111f, 0.002);
        renderer.setClearColor(scene.fog.color);

        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let positions = [];
        let sizes = [];
        rainGeo = new THREE.BufferGeometry();
        for (let i = 0; i < rainCount; i++) {
            rainDrop = new THREE.Vector3(
                Math.random() * 400 - 200,
                Math.random() * 500 - 250,
                Math.random() * 400 - 200
            );
            positions.push(Math.random() * 400 - 200);
            positions.push(Math.random() * 500 - 250);
            positions.push(Math.random() * 400 - 200);
            sizes.push(30);
        }
        rainGeo.setAttribute(
            "position",
            new THREE.BufferAttribute(new Float32Array(positions), 3)
        );
        rainGeo.setAttribute(
            "size",
            new THREE.BufferAttribute(new Float32Array(sizes), 1)
        );
        rainMaterial = new THREE.PointsMaterial({
            color: 0xaaaaaa,
            size: 0.1,
            transparent: true
        });
        rain = new THREE.Points(rainGeo, rainMaterial);
        scene.add(rain);

        let loader = new THREE.TextureLoader();
        loader.load(
            "https://static.vecteezy.com/system/resources/previews/010/884/548/original/dense-fluffy-puffs-of-white-smoke-and-fog-on-transparent-background-abstract-smoke-clouds-movement-blurred-out-of-focus-smoking-blows-from-machine-dry-ice-fly-fluttering-in-air-effect-texture-png.png",
            function (texture) {
                cloudGeo = new THREE.PlaneBufferGeometry(500, 500);
                cloudMaterial = new THREE.MeshLambertMaterial({
                    map: texture,
                    transparent: true
                });

                for (let p = 0; p < 25; p++) {
                    let cloud = new THREE.Mesh(cloudGeo, cloudMaterial);
                    cloud.position.set(
                        Math.random() * 800 - 400,
                        500,
                        Math.random() * 500 - 450
                    );
                    cloud.rotation.x = 1.16;
                    cloud.rotation.y = -0.12;
                    cloud.rotation.z = Math.random() * 360;
                    cloud.material.opacity = 0.6;
                    cloudParticles.push(cloud);
                    scene.add(cloud);
                }
                animate();
                window.addEventListener("resize", onWindowResize);
            }
        );
    }

    function createButtons() {
    const buttonsContainer = document.createElement('div');
    buttonsContainer.style.position = 'absolute';
    buttonsContainer.style.top = '50%';
    buttonsContainer.style.left = '50%';
    buttonsContainer.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(buttonsContainer);

    const buttonGroups = [
        ['Мое портфолио', 'https://example.com/portfolio'],
        ['Решение ТЗ', 'https://example.com/solution'],
        ['Дизайн макета', 'https://example.com/design']
    ];

    buttonGroups.forEach((group, groupIndex) => {
        const buttonGroup = document.createElement('div');
        buttonGroup.style.marginBottom = '50px'; // отступ между блоками
        buttonGroup.style.display = 'flex'; // используем flexbox для центрирования элементов

        group.forEach((name, index) => {
            const button = document.createElement('button');
            button.className = 'btn btn-primary neon-button mx-2 btn-styles';
            button.textContent = name;
            button.style.width = '200px'; // ширина кнопки

            // Добавляем обработчик события onclick для каждой кнопки
            button.onclick = function() {
                window.location.href = group[1]; // перенаправляем пользователя по ссылке
            };

            buttonGroup.appendChild(button);
            if (index < group.length - 1) {
                const spacer = document.createElement('div');
                spacer.style.width = '30px'; // отступ между кнопками внутри блока
                buttonGroup.appendChild(spacer);
            }
        });

        buttonsContainer.appendChild(buttonGroup);
        if (groupIndex < buttonGroups.length - 1) {
            const groupSpacer = document.createElement('div');
            groupSpacer.style.height = '50px'; // отступ между блоками
            buttonsContainer.appendChild(groupSpacer);
        }
    });
}

window.addEventListener('load', createButtons);










    function animate() {
        cloudParticles.forEach((p) => {
            p.rotation.z -= 0.002;
        });
        rainGeo.attributes.size.array.forEach((r, i) => {
            r += 0.3;
        });
        const time = Date.now() * 0.005;

        rainGeo.verticesNeedUpdate = true;

        rain.position.z -= 0.222;
        if (rain.position.z < -200) {
            rain.position.z = 0;
        }

        if (Math.random() > 0.93 || flash.power > 100) {
            if (flash.power < 100)
                flash.position.set(Math.random() * 400, 300 + Math.random() * 200, 100);
            flash.power = 50 + Math.random() * 500;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    init();

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    </script>
</body>
</html>
